apps:
  - name: lexacube
    repo: "https://github.com/stephen5ng/cubes"
    branch: "master"
    path: /opt/lexacube
    exec: /opt/lexacube/runpygame.sh --mode game_on --display mini
    user: root  # Required for rpi-rgb-led-matrix GPIO access
    after: "network.target"
    environment:
      - SDL_AUDIODRIVER=dummy
    apt_packages:
      - python3-dev
      - python3-pillow
      - python3-setuptools
      - build-essential
      - cython3
      - mosquitto
      - mosquitto-clients
      - netcat-openbsd
    dependencies:
      - repo: "https://github.com/hzeller/rpi-rgb-led-matrix"
        path: /opt/rpi-rgb-led-matrix
        build_cmd: "make -C {path}/lib"
        install_python_cmd: "pip install {path}/bindings/python"

  - name: nfc-control
    repo: "https://github.com/stephen5ng/nfc-control"
    path: /opt/nfc-control
    exec: /opt/lexacube/cube_env/bin/python3 /opt/nfc-control/nfc_control_daemon.py
    user: root
    after: "network.target mosquitto.service"
