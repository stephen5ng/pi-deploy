apps:
  - name: lexacube
    repo: "https://github.com/stephen5ng/cubes"
    branch: "master"
    path: /opt/lexacube
    venv: cube_env
    exec: /opt/lexacube/cube_env/bin/python3 /opt/lexacube/runpygame.py --mode classic
    user: root  # Required for rpi-rgb-led-matrix GPIO access
    after: "network.target"
    environment:
      - LED_DISPLAY_TYPE=mini
    apt_packages:
      - python3-dev
      - python3-pillow
      - python3-setuptools
      - build-essential
      - cython3
      - mosquitto
      - mosquitto-clients
      - netcat-openbsd
      - openssh-client
      - python3-venv
      - alsa-utils
    dependencies:
      - repo: "https://github.com/hzeller/rpi-rgb-led-matrix"
        path: /opt/rpi-rgb-led-matrix
        install_python_cmd: "pip install scikit-build-core cython && pip install {path}"

  - name: nfc-control
    repo: "https://github.com/stephen5ng/nfc-control"
    path: /opt/nfc-control
    exec: /opt/lexacube/cube_env/bin/python3 /opt/nfc-control/nfc_control_daemon.py
    user: root
    after: "network.target mosquitto.service"
